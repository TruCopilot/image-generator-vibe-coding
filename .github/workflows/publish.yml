name: Publish to npm

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Do NOT set registry-url — it writes _authToken to .npmrc and breaks OIDC
      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install npm 11.6+ for OIDC trusted publishing
        run: |
          npm install -g npm@11.6.2
          node --version
          npm --version

      - name: Verify OIDC is available
        run: |
          if [ -z "${ACTIONS_ID_TOKEN_REQUEST_URL}" ]; then
            echo "OIDC token NOT available"
            exit 1
          fi
          echo "OIDC token available"

      - name: Remove any .npmrc auth config (must use OIDC only)
        run: |
          rm -f ~/.npmrc "${RUNNER_TEMP}/.npmrc" .npmrc
          echo "Cleared .npmrc files"

      - run: npm ci
      - run: npm run build

      - name: Publish to npm via trusted publisher
        run: npm publish --access public
